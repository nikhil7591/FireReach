services:
  - type: web
    name: firereach-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENDER_EMAIL
        value: onboarding@resend.dev
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: DEMO_MODE
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.0"
